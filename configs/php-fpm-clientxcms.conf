; Dedicated php-fpm pool for ClientXCMS (Rocky/AlmaLinux).
; Listens on a Unix socket owned by nginx, matching the Nginx fastcgi_pass.

[clientxcms]
user = nginx
group = nginx

listen = /run/php-fpm/clientxcms.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 200

php_admin_value[memory_limit] = 512M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M
php_admin_value[max_execution_time] = 300
