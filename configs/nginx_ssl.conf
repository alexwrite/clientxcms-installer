# HTTPS vhost for a certificate you already own (ASSUME_SSL).
# For automatic Let's Encrypt, the installer uses the plain HTTP vhost and lets
# `certbot --nginx` inject the TLS configuration itself.

server {
    listen 80;
    listen [::]:80;
    server_name <domain>;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name <domain>;

    root <install_dir>/public;
    index index.php;
    charset utf-8;

    access_log /var/log/nginx/clientxcms.app-access.log;
    error_log  /var/log/nginx/clientxcms.app-error.log error;

    client_max_body_size 64m;
    client_body_timeout 120s;
    sendfile off;

    # Change these paths to your own certificate/key.
    ssl_certificate /etc/ssl/<domain>.pem;
    ssl_certificate_key /etc/ssl/<domain>.key;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy same-origin;
    add_header Content-Security-Policy "frame-ancestors 'self'";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:<php_socket>;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param PHP_VALUE "upload_max_filesize = 64M \n post_max_size=64M";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_intercept_errors off;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }
}
